<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>habedeeeeeeeeeee</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body {
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#a0c4ff,#ffc6ff);
      overflow:hidden;
      padding:15px;
    }

    .overlay {
      position:fixed;inset:0;background:#000;color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;z-index:10;cursor:pointer;
    }

    .card {
      display:none;
      background:rgba(255,255,255,0.95);
      padding:20px;
      border-radius:20px;
      max-width:90vw;
      width:100%;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    img {
      width:100%;
      max-height:40vh;
      object-fit:cover;
      border-radius:15px;
      margin-bottom:15px;
    }

    h1 {font-size:24px;margin-bottom:5px;}
    h2 {font-size:18px;margin-bottom:15px;color:#666;}

    p {
      font-size:14px;line-height:1.6;min-height:180px;
      white-space:pre-line;
    }

    .heart {font-size:22px;animation:beat 1s infinite;}

    @keyframes beat {
      0%,100%{transform:scale(1);}50%{transform:scale(1.2);}
    }

    .btn {
      margin-top:15px;padding:8px 18px;border:none;border-radius:20px;
      background:#ffafcc;color:#fff;cursor:pointer;
    }
  </style>
</head>
<body>

<div class="overlay" onclick="openCard()">
  tap sekali dlu bup
</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/7m6l9x.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">
  <img src="1000086774.jpg" alt="Aisa" />
  <h1>heoi 19th birthdey</h1>
  <h2>my oacar gwa</h2>
  <p id="text"></p>
  <div class="heart">💗</div>
  <button class="btn" onclick="alert('udah si gitu doang, yeeeeyyyyy, alovyuu')">klik ini</button>
</div>

<script>
const message = `swlsmat habede yang ke #19 sayanhh

ak seneng banhet bisa kenal ama km bup
makasi banhak karena udah jadi aisa
km keren km gacor
trus jdi urself yh lekk

klo caoe istirahat
klo ada aoa aoa cerita
ak mgga kemana mana bup

heoi terus buat my oacar
alovyuuuuu 💙❤💙❤💙❤`;

let i = 0;
function typeWriter(){
  if(i < message.length){
    document.getElementById('text').innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter,35);
  } else {
    launchConfetti();
  }
}

function launchConfetti(){
  confetti({particleCount:150,spread:70,origin:{y:0.6}});
}

function openCard(){
  const overlay = document.querySelector('.overlay');
  const card = document.getElementById('card');
  const music = document.getElementById('music');

  overlay.style.display='none';
  card.style.display='block';

  // play music
  music.play().catch(()=>{});

  // smooth fullscreen (only if supported)
  const docElm = document.documentElement;
  if (docElm.requestFullscreen) {
    docElm.requestFullscreen().catch(()=>{});
  } else if (docElm.webkitRequestFullscreen) { // Safari
    docElm.webkitRequestFullscreen();
  } else if (docElm.msRequestFullscreen) { // IE11
    docElm.msRequestFullscreen();
  }

  // start typing
  typeWriter();
}
</script>

</body>
</html>
